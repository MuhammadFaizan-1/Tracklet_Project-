<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Tracklet Live Tracking</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f5f5f5;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: #4285f4;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
      }

      .main-container {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .sidebar {
        width: 320px;
        background: white;
        padding: 20px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
      }

      .sidebar h2 {
        margin-bottom: 20px;
      }

      .info-card {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
      }

      .info-card p {
        margin: 8px 0;
      }

      #map {
        flex: 1;
        height: 100%;
      }

      .status {
        color: #34a853;
        font-weight: bold;
      }

      @media (max-width: 768px) {
        .main-container {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          height: 250px;
        }

        #map {
          height: calc(100vh - 320px);
        }
      }
    </style>
  </head>

  <body>
    <div class="header">Tracklet Live Location Tracking</div>

    <div class="main-container">
      <div class="sidebar">
        <h2>Journey Details</h2>

        <div class="info-card">
          <p><strong>Student:</strong> Ali Khan</p>
          <p>
            <strong>Status:</strong>
            <span class="status">On Route</span>
          </p>
        </div>

        <div class="info-card">
          <p><strong>Current Speed:</strong> 35 km/h</p>
          <p><strong>Distance Left:</strong> 2.4 km</p>
          <p><strong>ETA:</strong> 10 Minutes</p>
        </div>

        <div class="info-card">
          <p><strong>Pickup:</strong> Home</p>
          <p><strong>Destination:</strong> School</p>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      var map = L.map("map").setView([31.5204, 74.3587], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
      }).addTo(map);

      var home = L.marker([31.5204, 74.3587]).addTo(map).bindPopup("Home");

      var student = L.marker([31.5304, 74.3687])
        .addTo(map)
        .bindPopup("Current Location");

      var school = L.marker([31.5404, 74.3787]).addTo(map).bindPopup("School");

      var route = L.polyline(
        [
          [31.5204, 74.3587],
          [31.5304, 74.3687],
          [31.5404, 74.3787],
        ],
        {
          color: "#4285F4",
          weight: 6,
        },
      ).addTo(map);

      map.fitBounds(route.getBounds());
    </script>
  </body>
</html>
